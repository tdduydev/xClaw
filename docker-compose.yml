services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: xclaw
      POSTGRES_PASSWORD: xclaw
      POSTGRES_DB: xclaw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MongoDB (AI data: sessions, messages, memory) ──────
  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── xClaw Server ───────────────────────────────────────
  xclaw:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=5001
      - DATABASE_URL=postgresql://xclaw:xclaw@postgres:5432/xclaw
      - MONGODB_URL=mongodb://mongodb:27017/xclaw
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - CORS_ORIGINS=http://localhost,http://localhost:3000,http://localhost:3001,http://localhost:5001
      - OPENSHELL_ENABLED=true
      - OPENSHELL_GATEWAY_URL=http://openshell:8080
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-xclaw-dev-credential-key-do-not-use-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── OpenShell Gateway (AI Agent Sandbox Runtime) ──────
  openshell:
    image: ghcr.io/nvidia/openshell/gateway:latest
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openshell-data:/var/lib/openshell
      - ./deploy/policies:/etc/openshell/policies:ro
    environment:
      - OPENSHELL_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "openshell", "gateway", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Web Frontend (Nginx) ─────────────────────────────
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - xclaw

volumes:
  pgdata:
  mongodata:
  openshell-data:
